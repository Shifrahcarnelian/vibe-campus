<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Choose Your Role - VibeCampus</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="choose.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="container">
        <h1 class="title">Welcome to VibeCampus</h1>
        <p class="subtitle">Select your role to continue</p>

        <div class="role-selection">
            <a href="student.html" class="role-card student">
                <img src="student.png" alt="Student Icon">
                <h2>Student</h2>
                <p>Join study rooms, find peers, and explore clubs.</p>
            </a>
            

            <a href="tutor.html" class="role-card tutor">
                <img src="tutor.png" alt="Tutor Icon">
                <h2>Tutor</h2>
                <p>Help students, conduct sessions, and earn badges.</p>
            </a>
        </div>
    </div>
</body>
</html>
