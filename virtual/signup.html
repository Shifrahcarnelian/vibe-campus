<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>VibeCampus | Sign Up</title>
  <link rel="stylesheet" href="signup.css" />
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;800&display=swap" rel="stylesheet">
</head>
<body>
  <div class="branding">
    <img src="logo.jpeg" class="logo" alt="VibeCampus Logo" />
    <h1>VibeCampus</h1>
    <p class="subtitle">Reimagining Campus Life Online</p>
  </div>

  <div class="auth-box">
    
    <div class="form-panel left-panel">
      <form class="auth-form">
        <h2>Create Your Campus ID</h2>
        <input type="text" placeholder="College Name" required />
        <input type="text" placeholder="Register Number" required />
        <input type="text" placeholder="User ID" required />
        <div class="name-row">
          <input type="text" placeholder="First Name" required />
          <input type="text" placeholder="Last Name" required />
        </div>
        <input type="text" placeholder="Current Year" required />
        <input type="email" placeholder="College Email" required />
        <input type="password" placeholder="Create Password" required />
        <input type="password" placeholder="Confirm Password" required />
        <input type="tel" placeholder="Phone Number" required />
        <button class="primary">Submit</button>
      </form>
    </div>

    <div class="form-panel right-panel">
      <h2>Already a Member?</h2>
      <p>Sign in to continue collaborating with your peers!</p>
      <a href="signin.html"><button class="ghost">Sign In</button></a>
    </div>
    
  </div>
</body>
</html>
