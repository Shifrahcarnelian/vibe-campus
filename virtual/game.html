<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>VibeCampus Adventure Study Game — 100 Levels</title>
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <style>
    :root {
      --area-w: 860px;
      --area-h: 220px;
    }
    body {
      font-family: Inter, system-ui, -apple-system, "Segoe UI", Roboto, "Helvetica Neue", Arial;
      background: linear-gradient(120deg,#0f172a 0%,#031028 60%, #04293a 100%);
      color: #f1f5f9;
      margin: 0;
      padding: 28px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 16px;
      min-height: 100vh;
      box-sizing: border-box;
    }
    h1 { margin: 0; font-size: 22px; letter-spacing: 0.2px; }
    .topbar { display:flex; gap:12px; align-items:center; }
    .controls { display:flex; gap:8px; align-items:center; }

    #game-wrap {
      width: calc(var(--area-w) + 40px);
      max-width: calc(100% - 40px);
    }

    #health-bar {
      width: 100%;
      background: #284050;
      border: 2px solid rgba(255,255,255,0.06);
      border-radius: 8px;
      overflow: hidden;
      height: 22px;
      box-shadow: 0 6px 18px rgba(2,6,23,0.6) inset;
    }
    #health {
      height:100%;
      width:100%;
      background: linear-gradient(90deg,#10b981,#34d399);
      transition: width .5s ease, background .3s;
    }
    .health-text { font-size:13px; margin-top:6px; color:#cbd5e1; text-align:center; }

    #game-area {
      margin:16px auto;
      width: var(--area-w);
      height: var(--area-h);
      border-radius: 12px;
      overflow: hidden;
      position: relative;
      background-image: linear-gradient(180deg, rgba(255,255,255,0.02), rgba(0,0,0,0.06));
      border: 2px solid rgba(255,255,255,0.04);
      box-shadow: 0 10px 30px rgba(2,6,23,0.6);
    }

    /* simple repeating ground */
    #game-area::before{
      content:"";
      position:absolute;
      left:0; right:0; bottom:0; height:60%;
      background:
        linear-gradient(transparent 60%, rgba(0,0,0,0.06) 61%),
        linear-gradient(90deg, rgba(255,255,255,0.02) 1px, transparent 1px);
      background-size: 100% 100%, 40px 40px;
      pointer-events:none;
    }

    #player {
      width: 56px;
      height: 56px;
      position: absolute;
      bottom: 14px;
      left: 8px;
      background-image: url('https://i.imgur.com/Z6X3zjT.png');
      background-size: cover;
      transition: left 0.6s cubic-bezier(.2,.9,.2,1);
      filter: drop-shadow(0 8px 12px rgba(2,6,23,0.6));
      z-index: 12;
    }
    #finish-flag {
      position:absolute;
      right: 12px;
      bottom: 14px;
      width: 44px;
      height: 64px;
      background: linear-gradient(180deg,#fde68a,#f59e0b);
      border-radius:6px;
      box-shadow: 0 8px 18px rgba(0,0,0,0.5);
      display:flex; align-items:center; justify-content:center;
      font-weight:700; color:#082032; font-size:14px;
      z-index:8;
    }

    .hud {
      display:flex;
      justify-content:space-between;
      align-items:center;
      gap:12px;
      width:100%;
      margin-top:10px;
    }
    .level-box {
      background: rgba(255,255,255,0.03);
      padding:10px 12px;
      border-radius:8px;
      border:1px solid rgba(255,255,255,0.03);
    }
    .domain { font-size:13px; color:#e2e8f0; opacity:0.95; }
    .level-num { font-weight:700; font-size:16px; color:#fff; }

    #question-card {
      margin-top:18px;
      background: linear-gradient(180deg, rgba(255,255,255,0.02), rgba(0,0,0,0.06));
      padding:18px;
      border-radius:10px;
      width:100%;
      max-width: var(--area-w);
      border:1px solid rgba(255,255,255,0.03);
      box-shadow: 0 8px 30px rgba(2,6,23,0.5);
    }
    .q-title { font-size:18px; margin:0 0 12px 0; color:#f8fafc; }
    .options { display:flex; flex-wrap:wrap; gap:10px; }
    .opt {
      background: rgba(255,255,255,0.02);
      padding:10px 12px;
      border-radius:8px;
      cursor:pointer;
      min-width: 140px;
      border:1px solid rgba(255,255,255,0.03);
      text-align:center;
      transition: transform .12s, background .12s, box-shadow .12s;
      user-select:none;
    }
    .opt:hover { transform: translateY(-4px); background: rgba(255,255,255,0.03); }
    .opt.correct { background: rgba(16,185,129,0.14); border-color: rgba(16,185,129,0.3); }
    .opt.wrong { background: rgba(239,68,68,0.12); border-color: rgba(239,68,68,0.26); }

    #feedback { margin-top:10px; font-weight:600; min-height:20px; }

    .bottom-row { margin-top:12px; display:flex; gap:8px; align-items:center; justify-content:space-between; }

    button {
      background: linear-gradient(180deg,#0ea5b3,#0284c7);
      color: white;
      border: none;
      padding: 10px 12px;
      border-radius: 8px;
      cursor:pointer;
      font-weight:700;
      box-shadow: 0 8px 18px rgba(3,7,18,0.5);
    }
    button.secondary {
      background: transparent;
      border: 1px solid rgba(255,255,255,0.06);
      color:#e6eef6;
      font-weight:600;
    }
    .muted { color:#93c5fd; opacity:0.9; font-size:13px; }

    /* responsive */
    @media (max-width:960px){
      :root { --area-w: 92vw; }
      #player { transform-origin:center; }
    }
  </style>
</head>
<body>
  <div id="game-wrap">
    <div class="topbar">
      <h1>VibeCampus — Adventure Study Game (100 Levels)</h1>
      <div style="flex:1"></div>
      <div class="controls">
        <button id="restartBtn" class="secondary">Restart</button>
      </div>
    </div>

    <div style="margin-top:12px;">
      <div id="health-bar"><div id="health"></div></div>
      <div class="health-text" id="healthText">Health: 100%</div>
    </div>

    <div id="game-area" aria-hidden="false">
      <div id="player" title="Your character"></div>
      <div id="finish-flag" aria-hidden="true">🏁</div>
    </div>

    <div class="hud">
      <div class="level-box">
        <div class="domain" id="domainLabel">Domain</div>
        <div class="level-num" id="levelLabel">Level 1 / 100</div>
      </div>
      <div style="flex:1"></div>
      <div class="muted">Wrong answer drains 20% health • Reach level 100 to win</div>
    </div>

    <div id="question-card">
      <div class="q-title" id="questionText">Loading...</div>
      <div class="options" id="optionsContainer"></div>
      <div id="feedback"></div>
      <div class="bottom-row">
        <div class="muted" id="progressText">Progress</div>
        <div>
          <button id="skipBtn" class="secondary" title="Skip level (not allowed)">Skip</button>
          <button id="nextBtn" style="display:none">Next</button>
        </div>
      </div>
    </div>
  </div>

// Game state
const TOTAL_LEVELS = levels.length; // 100
let currentLevel = 0; // 0-based index for levels array
let health = 100;
const player = document.getElementById('player');
const healthEl = document.getElementById('health');
const healthText = document.getElementById('healthText');
const domainLabel = document.getElementById('domainLabel');
const levelLabel = document.getElementById('levelLabel');
const questionText = document.getElementById('questionText');
const optionsContainer = document.getElementById('optionsContainer');
const feedback = document.getElementById('feedback');
const progressText = document.getElementById('progressText');
const restartBtn = document.getElementById('restartBtn');
const nextBtn = document.getElementById('nextBtn');
const skipBtn = document.getElementById('skipBtn');

function updateHUD(){
  const lvl = currentLevel + 1;
  domainLabel.textContent = levels[currentLevel].domain;
  levelLabel.textContent = `Level ${lvl} / ${TOTAL_LEVELS}`;
  progressText.textContent = `Progress: ${lvl-1} completed • ${TOTAL_LEVELS - (lvl-1)} remaining`;
  healthEl.style.width = health + "%";
  healthText.textContent = `Health: ${health}%`;
  if (health <= 40) {
    healthEl.style.background = "linear-gradient(90deg,#f97316,#ef4444)";
  } else {
    healthEl.style.background = "linear-gradient(90deg,#10b981,#34d399)";
  }
}

function renderLevel(){
  updateHUD();
  const item = levels[currentLevel];
  questionText.textContent = `${item.q}`;
  optionsContainer.innerHTML = '';
  feedback.textContent = '';
  // shuffle options for fairness
  const opts = shuffleArray([...item.options]);
  opts.forEach(optText=>{
    const div = document.createElement('div');
    div.className = 'opt';
    div.textContent = optText;
    div.onclick = ()=> handleAnswer(div, optText);
    optionsContainer.appendChild(div);
  });
  movePlayerTo(currentLevel);
  nextBtn.style.display = 'none';
}

function handleAnswer(div, chosen){
  // disable further clicks until processed
  const opts = document.querySelectorAll('.opt');
  opts.forEach(o=> o.onclick = null);

  const correct = levels[currentLevel].answer;
  if (chosen === correct){
    div.classList.add('correct');
    feedback.textContent = "✅ Correct! Advancing to next level...";
    // progress after small delay to let user see green highlight
    setTimeout(()=> {
      currentLevel++;
      if (currentLevel >= TOTAL_LEVELS){
        showVictory();
      } else {
        renderLevel();
      }
    }, 700);
  } else {
    div.classList.add('wrong');
    feedback.textContent = "❌ Wrong — you lost 20% health. Try the same level again.";
    // drain health
    health -= 20;
    if (health < 0) health = 0;
    updateHUD();
    // if health zero, game over
    if (health === 0){
      setTimeout(gameOver, 600);
      return;
    }
    // re-enable options after small delay
    setTimeout(()=>{
      renderLevel(); // re-render same level so options reshuffle
    }, 900);
  }
}

function movePlayerTo(levelIndex){
  // Place player proportionally across the area
  // left: 8px at level 0 to (containerWidth - 8 - playerWidth) at final
  // compute as percentage
  const pct = (levelIndex / (TOTAL_LEVELS - 1)); // 0..1
  const container = document.getElementById('game-area');
  const containerWidth = container.clientWidth;
  const playerWidth = player.clientWidth;
  const minLeft = 8;
  const maxLeft = containerWidth - playerWidth - 12;
  const left = Math.round(minLeft + (maxLeft - minLeft) * pct);
  player.style.left = left + 'px';
}

function showVictory(){
  questionText.textContent = "🎉 Congratulations — You reached Level 100!";
  optionsContainer.innerHTML = '';
  feedback.textContent = `Final Health: ${health}% — You conquered the VibeCampus Adventure!`;
  movePlayerTo(TOTAL_LEVELS - 1);
  nextBtn.style.display = 'none';
}

function gameOver(){
  questionText.textContent = "💀 Game Over — You lost all your health.";
  optionsContainer.innerHTML = '';
  feedback.textContent = "Press Restart to try again.";
  // show player collapsed (visual cue)
  player.style.transform = 'translateY(8px) rotate(-8deg) scale(.95)';
}

restartBtn.onclick = ()=>{
  currentLevel = 0;
  health = 100;
  player.style.transform = 'none';
  renderLevel();
};

skipBtn.onclick = ()=>{
  // skipping not allowed — show a tip
  feedback.textContent = "Skipping is disabled. Answer correctly to advance.";
};

function shuffleArray(arr){
  for (let i = arr.length -1; i>0; i--){
    const j = Math.floor(Math.random() * (i+1));
    [arr[i], arr[j]] = [arr[j], arr[i]];
  }
  return arr;
}

// initial render
renderLevel();

// keyboard shortcuts: number keys to choose options 1..4
document.addEventListener('keydown', (e)=>{
  if (e.key >= '1' && e.key <= '9'){
    const idx = Number(e.key) - 1;
    const opts = document.querySelectorAll('.opt');
    if (opts[idx]) opts[idx].click();
  } else if (e.key === 'r' || e.key === 'R'){
    restartBtn.click();
  }
});
</script>
</body>
